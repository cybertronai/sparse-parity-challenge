name: Evaluate Submission

on:
  issues:
    types: [opened, labeled]

jobs:
  evaluate:
    if: contains(github.event.issue.labels.*.name, 'submission')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install numpy
        run: pip install numpy

      - name: Run evaluation
        id: eval
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PYTHONPATH: src
        run: python3 bin/evaluate
        continue-on-error: true

      - name: Post results comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('result.md', 'utf8');
            } catch {
              body = '❌ Evaluation failed. Check the [workflow logs](' +
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}` +
                ') for details.';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Handle failed submission
        if: steps.eval.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            // Add "failed" label
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['failed']
              });
            } catch {
              // Label might not exist yet, create it
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'failed',
                color: 'e11d48',
                description: 'Submission did not pass accuracy gate'
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['failed']
              });
            }
            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Open leaderboard PR
        if: steps.eval.outcome == 'success'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f leaderboard_update.json ]; then
            echo "No leaderboard_update.json found"
            exit 0
          fi

          # Update leaderboard JSON
          python3 bin/update-leaderboard

          # Render to README
          python3 bin/render-leaderboard

          # Extract method name for branch/PR
          METHOD=$(python3 -c "import json; print(json.load(open('leaderboard_update.json'))['method'])")
          DMC=$(python3 -c "import json; print(f\"{json.load(open('leaderboard_update.json'))['dmc']:,.0f}\")")

          # Create branch and commit
          BRANCH="leaderboard/issue-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add leaderboard.json README.md
          git commit -m "Leaderboard: ${METHOD} (DMC ${DMC}) from #${ISSUE_NUMBER}"
          git push origin "$BRANCH"

          # Open PR
          PR_URL=$(gh pr create \
            --title "Leaderboard: ${METHOD} (DMC ${DMC}) #${ISSUE_NUMBER}" \
            --body "Auto-generated from passing submission #${ISSUE_NUMBER} by @${ISSUE_AUTHOR}.

          | Metric | Value |
          |--------|-------|
          | Method | ${METHOD} |
          | DMC | ${DMC} |

          Merge to update the leaderboard." \
            --base main \
            --head "$BRANCH")

          # Close the submission issue with link to PR
          gh issue close "$ISSUE_NUMBER" --comment "Leaderboard PR created: ${PR_URL}"
          gh issue edit "$ISSUE_NUMBER" --add-label "passed"
